<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Model Viewer</title>
<script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { 
    width: 100%; 
    height: 100vh; 
    overflow: hidden;
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #121212;
    color: #e0e0e0;
}

/* Toolbar */
#toolbar {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 48px;
    background: rgba(18, 18, 18, 0.85);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(255,255,255,0.08);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    z-index: 100;
}
#toolbar .title {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.3px;
    color: #fff;
}
#toolbar .controls {
    display: flex;
    gap: 6px;
}
#toolbar button {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.1);
    color: #ccc;
    padding: 6px 14px;
    border-radius: 6px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
}
#toolbar button:hover {
    background: rgba(255,255,255,0.15);
    color: #fff;
}
#toolbar button.active {
    background: rgba(99, 102, 241, 0.3);
    border-color: rgba(99, 102, 241, 0.5);
    color: #a5b4fc;
}

/* Annotations split button + dropdown */
.btn-group {
    position: relative;
    display: inline-flex;
}
.btn-group .btn-main {
    border-radius: 6px 0 0 6px;
    border-right: none;
}
.btn-group .btn-drop {
    border-radius: 0 6px 6px 0;
    padding: 6px 7px;
    font-size: 9px;
    border-left: 1px solid rgba(255,255,255,0.1);
}
.btn-group .btn-main.active + .btn-drop {
    background: rgba(99, 102, 241, 0.2);
    border-color: rgba(99, 102, 241, 0.5);
    color: #a5b4fc;
}
.btn-group .btn-drop:hover {
    background: rgba(99, 102, 241, 0.4);
}
.btn-dropdown {
    display: none;
    position: absolute;
    top: calc(100% + 4px);
    right: 0;
    background: #1e1e1e;
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 6px;
    padding: 4px 0;
    min-width: 140px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.6);
    z-index: 500;
}
.btn-dropdown.visible { display: block; }
.btn-dropdown button {
    display: block;
    width: 100%;
    background: none;
    border: none;
    color: #ccc;
    padding: 7px 14px;
    font-size: 12px;
    text-align: left;
    cursor: pointer;
    border-radius: 0;
    white-space: nowrap;
}
.btn-dropdown button:hover {
    background: rgba(99, 102, 241, 0.2);
    color: #fff;
}
.btn-dropdown .dd-divider {
    height: 1px;
    background: rgba(255,255,255,0.08);
    margin: 4px 0;
}

/* Help panel */
#help-panel {
    position: absolute;
    bottom: 20px;
    left: 20px;
    background: rgba(18, 18, 18, 0.85);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.08);
    padding: 14px 18px;
    border-radius: 10px;
    font-size: 12px;
    z-index: 100;
    line-height: 1.8;
    transition: opacity 0.3s;
}
#help-panel .key {
    display: inline-block;
    background: rgba(255,255,255,0.1);
    padding: 1px 8px;
    border-radius: 4px;
    font-size: 11px;
    margin-right: 6px;
    min-width: 60px;
    text-align: center;
}

/* Model viewer */
model-viewer {
    width: 100%;
    height: 100vh;
    background-color: #1e1e1e;
    --poster-color: #1e1e1e;
    --progress-bar-color: #6366f1;
    --progress-bar-height: 3px;
}

/* Loading overlay */
#loading-overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(18, 18, 18, 0.9);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 200;
    transition: opacity 0.5s;
}
#loading-overlay.hidden {
    opacity: 0;
    pointer-events: none;
}
.loader-content {
    text-align: center;
}
.spinner {
    width: 40px;
    height: 40px;
    border: 3px solid rgba(255,255,255,0.1);
    border-top-color: #6366f1;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loader-content p {
    font-size: 14px;
    color: #aaa;
}

/* Select mode cursor */
model-viewer {
    cursor: pointer;
}

/* Properties panel */
#properties-panel {
    position: absolute;
    top: 58px;
    right: 10px;
    width: 300px;
    max-height: calc(100vh - 80px);
    overflow-y: auto;
    background: rgba(18, 18, 18, 0.9);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px;
    padding: 16px;
    z-index: 100;
    font-size: 13px;
    display: none;
}
#properties-panel.visible {
    display: block;
}
#properties-panel h3 {
    font-size: 14px;
    font-weight: 600;
    color: #a5b4fc;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
}
#properties-panel h3 .close-btn {
    background: none;
    border: none;
    color: #888;
    font-size: 18px;
    cursor: pointer;
    padding: 0 4px;
    line-height: 1;
}
#properties-panel h3 .close-btn:hover {
    color: #fff;
}
#properties-panel table {
    width: 100%;
    border-collapse: collapse;
}
#properties-panel table td {
    padding: 5px 0;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    vertical-align: top;
}
#properties-panel table td:first-child {
    color: #888;
    width: 100px;
    padding-right: 10px;
    font-size: 12px;
}
#properties-panel table td:last-child {
    color: #e0e0e0;
    word-break: break-word;
}
#properties-panel .section-title {
    font-size: 11px;
    font-weight: 600;
    color: #6366f1;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-top: 12px;
    margin-bottom: 6px;
    padding-top: 8px;
    border-top: 1px solid rgba(255,255,255,0.06);
}
#properties-panel .no-selection {
    color: #666;
    text-align: center;
    padding: 20px 0;
    font-style: italic;
}

/* Context menu */
#context-menu {
    position: absolute;
    display: none;
    background: rgba(30, 30, 30, 0.95);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 8px;
    padding: 4px 0;
    z-index: 300;
    min-width: 180px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.5);
}
#context-menu .ctx-item {
    display: block;
    width: 100%;
    background: none;
    border: none;
    color: #e0e0e0;
    padding: 8px 16px;
    font-size: 13px;
    text-align: left;
    cursor: pointer;
}
#context-menu .ctx-item:hover {
    background: rgba(99, 102, 241, 0.25);
    color: #fff;
}
#context-menu .ctx-divider {
    height: 1px;
    background: rgba(255,255,255,0.08);
    margin: 4px 0;
}

/* Modal overlay */
.modal-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.6);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 400;
}
.modal-overlay.visible { display: flex; }
.modal {
    background: #1e1e1e;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 24px;
    width: 420px;
    max-width: 90vw;
    box-shadow: 0 12px 40px rgba(0,0,0,0.6);
}
.modal h3 {
    font-size: 16px;
    font-weight: 600;
    color: #a5b4fc;
    margin-bottom: 16px;
}
.modal label {
    display: block;
    font-size: 12px;
    color: #888;
    margin-bottom: 4px;
    margin-top: 12px;
}
.modal input, .modal select, .modal textarea {
    width: 100%;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 6px;
    color: #e0e0e0;
    padding: 8px 10px;
    font-size: 13px;
    font-family: inherit;
}
.modal textarea { resize: vertical; min-height: 60px; }
.modal input:focus, .modal select:focus, .modal textarea:focus {
    outline: none;
    border-color: #6366f1;
}
.modal-actions {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
    margin-top: 18px;
}
.modal-actions button {
    padding: 8px 18px;
    border-radius: 6px;
    font-size: 13px;
    cursor: pointer;
    border: 1px solid rgba(255,255,255,0.1);
}
.modal-actions .btn-save {
    background: #6366f1;
    color: #fff;
    border-color: #6366f1;
}
.modal-actions .btn-save:hover { background: #5558e6; }
.modal-actions .btn-cancel {
    background: rgba(255,255,255,0.08);
    color: #ccc;
}
.modal-actions .btn-cancel:hover { background: rgba(255,255,255,0.15); }
.modal-actions .btn-delete {
    background: rgba(239,68,68,0.2);
    color: #f87171;
    border-color: rgba(239,68,68,0.3);
    margin-right: auto;
}
.modal-actions .btn-delete:hover { background: rgba(239,68,68,0.35); }

/* Annotations table panel */
#annotations-panel {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(10,10,10,0.95);
    display: none;
    flex-direction: column;
    z-index: 350;
}
#annotations-panel.visible { display: flex; }
#annotations-panel .ap-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 24px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
}
#annotations-panel .ap-header h2 {
    font-size: 18px;
    color: #fff;
    font-weight: 600;
}
#annotations-panel .ap-actions {
    display: flex;
    gap: 8px;
}
#annotations-panel .ap-actions button {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.1);
    color: #ccc;
    padding: 6px 14px;
    border-radius: 6px;
    font-size: 12px;
    cursor: pointer;
}
#annotations-panel .ap-actions button:hover {
    background: rgba(255,255,255,0.15);
    color: #fff;
}
#annotations-panel .ap-body {
    flex: 1;
    overflow-y: auto;
    padding: 16px 24px;
}
#annotations-panel table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
}
#annotations-panel thead th {
    text-align: left;
    padding: 10px 12px;
    background: rgba(255,255,255,0.04);
    color: #888;
    font-weight: 600;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    position: sticky;
    top: 0;
}
#annotations-panel tbody td {
    padding: 10px 12px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    color: #e0e0e0;
    vertical-align: top;
}
#annotations-panel tbody tr:hover {
    background: rgba(99,102,241,0.08);
}
#annotations-panel tbody tr { cursor: pointer; }
.status-badge {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 10px;
    font-size: 11px;
    font-weight: 600;
}
.status-good { background: rgba(34,197,94,0.2); color: #4ade80; }
.status-needs-repair { background: rgba(234,179,8,0.2); color: #facc15; }
.status-critical { background: rgba(239,68,68,0.2); color: #f87171; }
.status-replaced { background: rgba(99,102,241,0.2); color: #a5b4fc; }
.status-pending { background: rgba(156,163,175,0.2); color: #9ca3af; }
.ap-empty {
    text-align: center;
    color: #555;
    padding: 60px 0;
    font-style: italic;
}
#import-file { display: none; }

/* Floating label popup menu */
#fl-popup-menu {
    position: absolute;
    display: none;
    background: rgba(30, 30, 30, 0.95);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 8px;
    padding: 4px 0;
    z-index: 500;
    min-width: 180px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.5);
}
#fl-popup-menu.visible { display: block; }
#fl-popup-menu .fpm-item {
    display: block;
    width: 100%;
    background: none;
    border: none;
    color: #e0e0e0;
    padding: 8px 16px;
    font-size: 13px;
    text-align: left;
    cursor: pointer;
}
#fl-popup-menu .fpm-item:hover {
    background: rgba(99, 102, 241, 0.25);
    color: #fff;
}



/* Part locator pin */
#part-pin {
    position: absolute;
    z-index: 150;
    pointer-events: none;
    display: none;
    transform: translate(-50%, -100%);
    transition: left 0.1s, top 0.1s;
}
#part-pin.visible { display: block; }
#part-pin .pin-icon {
    font-size: 32px;
    filter: drop-shadow(0 2px 6px rgba(0,0,0,0.5));
    animation: pinBounce 0.8s ease-in-out infinite;
}
#part-pin .pin-label {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    bottom: 36px;
    white-space: nowrap;
    background: rgba(99, 102, 241, 0.9);
    color: #fff;
    font-size: 11px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 6px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    max-width: 220px;
    overflow: hidden;
    text-overflow: ellipsis;
}
#part-pin .pin-label::after {
    content: '';
    position: absolute;
    top: 100%;
    left: 50%;
    transform: translateX(-50%);
    border: 5px solid transparent;
    border-top-color: rgba(99, 102, 241, 0.9);
}
@keyframes pinBounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
}
#part-pin .pin-ring {
    position: absolute;
    bottom: -4px;
    left: 50%;
    transform: translateX(-50%);
    width: 20px;
    height: 8px;
    border-radius: 50%;
    background: rgba(99, 102, 241, 0.3);
    animation: pinPulse 1.2s ease-in-out infinite;
}
@keyframes pinPulse {
    0%, 100% { transform: translateX(-50%) scale(1); opacity: 0.4; }
    50% { transform: translateX(-50%) scale(1.8); opacity: 0.1; }
}

/* ─── Potree-style floating 3D annotation labels ─── */
#floating-labels-container {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    z-index: 90;
    overflow: hidden;
}
.float-label {
    position: absolute;
    pointer-events: auto;
    transform: translate(-50%, -100%);
    transition: opacity 0.2s;
    cursor: pointer;
    filter: drop-shadow(0 2px 8px rgba(0,0,0,0.5));
}
.float-label.hidden { opacity: 0; pointer-events: none; }
.float-label .fl-bubble {
    background: rgba(30, 30, 30, 0.88);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 6px;
    padding: 5px 12px;
    display: flex;
    align-items: center;
    gap: 7px;
    white-space: nowrap;
    backdrop-filter: blur(6px);
    transition: background 0.15s, border-color 0.15s;
}
.float-label:hover .fl-bubble {
    background: rgba(50, 50, 60, 0.95);
    border-color: rgba(99, 102, 241, 0.6);
}
.float-label .fl-dot {
    width: 9px;
    height: 9px;
    border-radius: 50%;
    flex-shrink: 0;
    box-shadow: 0 0 6px currentColor;
}
.float-label .fl-dot.good { background: #4ade80; color: #4ade80; }
.float-label .fl-dot.needs-repair { background: #facc15; color: #facc15; }
.float-label .fl-dot.critical { background: #f87171; color: #f87171; }
.float-label .fl-dot.replaced { background: #a5b4fc; color: #a5b4fc; }
.float-label .fl-dot.pending { background: #9ca3af; color: #9ca3af; }
.float-label .fl-title {
    font-size: 12px;
    font-weight: 600;
    color: #e8e8e8;
    max-width: 180px;
    overflow: hidden;
    text-overflow: ellipsis;
}
.float-label .fl-stem {
    position: absolute;
    left: 50%;
    top: 100%;
    width: 1px;
    height: 28px;
    background: linear-gradient(to bottom, rgba(255,255,255,0.4), rgba(255,255,255,0));
    transform: translateX(-50%);
}
.float-label .fl-anchor {
    position: absolute;
    left: 50%;
    top: calc(100% + 28px);
    transform: translate(-50%, -50%);
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: rgba(255,255,255,0.7);
    border: 1.5px solid rgba(255,255,255,0.9);
}
.float-label .fl-expand {
    display: none;
    margin-top: 4px;
    padding: 6px 10px;
    background: rgba(20, 20, 25, 0.92);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 0 0 6px 6px;
    font-size: 11px;
    color: #aaa;
    max-width: 240px;
    white-space: normal;
    word-break: break-word;
}
.float-label:hover .fl-expand { display: block; }
.float-label .fl-expand .fl-meta {
    color: #666;
    font-size: 10px;
    margin-top: 3px;
}
</style>
</head>

<body>

<!-- Toolbar -->
<div id="toolbar">
    <span class="title">3D Model Viewer</span>
    <div class="controls">
        <button id="btn-rotate" onclick="toggleRotate()">Auto Rotate</button>
        <button id="btn-wireframe" onclick="toggleBackground()">Light BG</button>
        <button id="btn-reset" onclick="resetView()">Reset View</button>
        <div class="btn-group">
            <button id="btn-labels" class="btn-main active" onclick="toggleFloatingLabels()">Annotations</button>
            <button class="btn-drop" onclick="toggleAnnotationsDropdown(event)">&#9662;</button>
            <div class="btn-dropdown" id="annotations-dropdown">
                <button onclick="toggleAnnotationsPanel(); closeAnnotationsDropdown()">View All</button>
                <button onclick="exportPDF(); closeAnnotationsDropdown()">Export PDF</button>
            </div>
        </div>
        <button id="btn-help" class="active" onclick="toggleHelp()">Help</button>
        <label style="display:flex;align-items:center;gap:6px;color:#aaa;font-size:12px;">Brightness
            <input type="range" id="exposure-slider" min="0.2" max="2.0" step="0.05" value="0.7"
                style="width:80px;accent-color:#6366f1;" oninput="setExposure(this.value)">
        </label>
    </div>
</div>

<!-- Loading overlay -->
<div id="loading-overlay">
    <div class="loader-content">
        <div class="spinner"></div>
        <p>Loading 3D Model...</p>
    </div>
</div>

<!-- Help panel -->
<div id="help-panel">
    <span class="key">Left Click</span> Select part<br>
    <span class="key">Right Click</span> Add annotation<br>
    <span class="key">Left Drag</span> Rotate model<br>
    <span class="key">Right Drag</span> Move view<br>
    <span class="key">Scroll</span> Zoom in / out
</div>

<!-- Context menu -->
<div id="context-menu">
    <button class="ctx-item" onclick="openAnnotationForm()">Add Annotation</button>
</div>

<!-- Annotation modal -->
<div id="annotation-modal" class="modal-overlay">
    <div class="modal">
        <h3 id="modal-title">Add Annotation</h3>
        <label>Equipment Name</label>
        <input type="text" id="ann-equipment" placeholder="Equipment name">
        <label>Status</label>
        <select id="ann-status">
            <option value="Good">Good</option>
            <option value="Needs Repair">Needs Repair</option>
            <option value="Critical">Critical</option>
            <option value="Replaced">Replaced</option>
            <option value="Pending">Pending Inspection</option>
        </select>
        <label>Inspector</label>
        <input type="text" id="ann-inspector" placeholder="Inspector name">
        <label>Date</label>
        <input type="date" id="ann-date">
        <label>Remarks</label>
        <textarea id="ann-remarks" placeholder="Inspection notes..."></textarea>
        <div class="modal-actions">
            <button class="btn-delete" id="btn-ann-delete" style="display:none" onclick="deleteAnnotation()">Delete</button>
            <button class="btn-cancel" onclick="closeAnnotationModal()">Cancel</button>
            <button class="btn-save" onclick="saveAnnotation()">Save</button>
        </div>
    </div>
</div>

<!-- Annotations table panel -->
<div id="annotations-panel">
    <div class="ap-header">
        <h2>Inspection Annotations</h2>
        <div class="ap-actions">
            <button onclick="toggleAnnotationsPanel()" style="font-weight:bold">&times; Close</button>
        </div>
    </div>
    <div class="ap-body">
        <div id="annotations-table-container"></div>
    </div>
</div>



<!-- Floating label popup menu -->
<div id="fl-popup-menu">
    <button class="fpm-item" id="fpm-edit">Edit Annotation</button>
    <button class="fpm-item" id="fpm-view">View Part Annotations</button>
</div>

<!-- Floating 3D Annotation Labels (Potree-style) -->
<div id="floating-labels-container"></div>

<!-- Part locator pin -->
<div id="part-pin">
    <div class="pin-label" id="pin-label"></div>
    <div class="pin-icon">📍</div>
    <div class="pin-ring"></div>
</div>

<!-- Properties panel -->
<div id="properties-panel">
    <h3>Properties <button class="close-btn" onclick="event.stopPropagation(); closeProperties()">&times;</button></h3>
    <div id="properties-content">
        <div class="no-selection">Click on a part to view its properties</div>
    </div>
</div>

<model-viewer
    id="viewer"
    src="model.glb"
    alt="3D Model"
    camera-controls
    disable-tap
    touch-action="pan-y"
    shadow-intensity="0.3"
    exposure="0.7"
    shadow-softness="0.5"
    loading="eager"
    interpolation-decay="100"
    orbit-sensitivity="1"
    environment-image="neutral"
    tone-mapping="commerce"
    min-camera-orbit="auto auto 0.1m"
    max-camera-orbit="auto auto 2000m"
    min-field-of-view="5deg"
    max-field-of-view="120deg"
>
</model-viewer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.164.0/build/three.module.js"
    }
}
</script>
<script type="module">
    import * as THREE from 'three';

    const viewer = document.getElementById('viewer');
    const overlay = document.getElementById('loading-overlay');

    // Hide loading when model is ready
    viewer.addEventListener('load', function() {
        overlay.classList.add('hidden');
        console.log('[3D Viewer] Model loaded');
        // Debug: log the internals we find
        const internals = getInternals();
        if (internals) {
            console.log('[3D Viewer] Scene found:', internals.scene);
            console.log('[3D Viewer] Camera found:', internals.camera);
            let meshCount = 0;
            internals.scene.traverse(c => { if (c.isMesh) meshCount++; });
            console.log('[3D Viewer] Meshes in scene:', meshCount);
        } else {
            console.warn('[3D Viewer] Could not access Three.js internals');
        }
    });

    // ─── TOOLBAR CONTROLS ───
    window.toggleRotate = function() {
        const btn = document.getElementById('btn-rotate');
        if (viewer.hasAttribute('auto-rotate')) {
            viewer.removeAttribute('auto-rotate');
            btn.classList.remove('active');
        } else {
            viewer.setAttribute('auto-rotate', '');
            btn.classList.add('active');
        }
    };

    window.toggleBackground = function() {
        const btn = document.getElementById('btn-wireframe');
        const isDark = viewer.style.backgroundColor !== 'rgb(240, 240, 240)';
        if (isDark) {
            viewer.style.backgroundColor = '#f0f0f0';
            btn.classList.add('active');
            btn.textContent = 'Dark BG';
        } else {
            viewer.style.backgroundColor = '#1e1e1e';
            btn.classList.remove('active');
            btn.textContent = 'Light BG';
        }
    };

    window.toggleHelp = function() {
        const panel = document.getElementById('help-panel');
        const btn = document.getElementById('btn-help');
        if (panel.style.display === 'none') {
            panel.style.display = 'block';
            btn.classList.add('active');
        } else {
            panel.style.display = 'none';
            btn.classList.remove('active');
        }
    };

    window.setExposure = function(val) {
        viewer.setAttribute('exposure', val);
    };

    window.resetView = function() {
        viewer.cameraOrbit = 'auto auto auto';
        viewer.cameraTarget = 'auto auto auto';
        viewer.fieldOfView = 'auto';
    };

    // ─── ACCESS MODEL-VIEWER'S INTERNAL THREE.JS ───
    function getInternals() {
        // model-viewer 3.x stores its Three.js ModelScene (extends Scene)
        // under a Symbol('scene') property on the element.
        // The ModelScene has a .camera property (PerspectiveCamera).
        for (const sym of Object.getOwnPropertySymbols(viewer)) {
            try {
                const val = viewer[sym];
                if (val && typeof val === 'object' && val.isScene && val.camera) {
                    return { scene: val, camera: val.camera };
                }
            } catch (e) { /* skip */ }
        }

        // Fallback: search nested objects on symbols for scene/camera
        for (const sym of Object.getOwnPropertySymbols(viewer)) {
            try {
                const val = viewer[sym];
                if (!val || typeof val !== 'object') continue;
                for (const key of Object.keys(val)) {
                    const nested = val[key];
                    if (nested && nested.isScene && nested.camera) {
                        return { scene: nested, camera: nested.camera };
                    }
                }
            } catch (e) { /* skip */ }
        }

        return null;
    }

    // Force model-viewer to re-render after material changes
    function forceRender() {
        for (const sym of Object.getOwnPropertySymbols(viewer)) {
            try {
                const val = viewer[sym];
                if (val && typeof val === 'object' && typeof val.isDirty === 'function') {
                    val.isDirty();
                    return;
                }
            } catch (e) { /* skip */ }
        }
        // Fallback: nudge exposure to trigger re-render
        const exp = parseFloat(viewer.getAttribute('exposure') || '1');
        viewer.setAttribute('exposure', String(exp + 0.001));
        requestAnimationFrame(() => viewer.setAttribute('exposure', String(exp)));
    }

    // ─── PART PICKING (always on) ───
    let selectedMesh = null;
    let originalMaterials = new Map();
    let pointerDownPos = null;
    let pointerDownTime = 0;

    window.closeProperties = function() {
        document.getElementById('properties-panel').classList.remove('visible');
        clearHighlight();
    };

    function clearHighlight() {
        if (selectedMesh && selectedMesh.material) {
            const orig = originalMaterials.get(selectedMesh);
            if (orig) {
                selectedMesh.material.emissive.copy(orig.emissive);
                selectedMesh.material.emissiveIntensity = orig.emissiveIntensity;
                selectedMesh.material.needsUpdate = true;
            }
            selectedMesh = null;
            forceRender();
        }
        hidePin();
    }

    function highlightMesh(mesh) {
        clearHighlight();
        selectedMesh = mesh;

        if (!originalMaterials.has(mesh)) {
            originalMaterials.set(mesh, {
                emissive: mesh.material.emissive.clone(),
                emissiveIntensity: mesh.material.emissiveIntensity
            });
        }

        mesh.material.emissive.setHex(0x4444ff);
        mesh.material.emissiveIntensity = 0.6;
        mesh.material.needsUpdate = true;
        forceRender();
    }

    // ─── RAYCASTING — detect click vs drag ───
    viewer.addEventListener('pointerdown', (event) => {
        if (event.button !== 0) return; // left click only
        pointerDownPos = { x: event.clientX, y: event.clientY };
        pointerDownTime = Date.now();
    });

    viewer.addEventListener('pointerup', (event) => {
        if (event.button !== 0 || !pointerDownPos) return;
        const dx = event.clientX - pointerDownPos.x;
        const dy = event.clientY - pointerDownPos.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        const elapsed = Date.now() - pointerDownTime;
        pointerDownPos = null;

        // Only treat as a click if barely moved and quick tap
        if (dist > 6 || elapsed > 400) return;

        const internals = getInternals();
        if (!internals) {
            console.warn('[3D Viewer] Cannot pick: internals not found');
            return;
        }

        const { scene, camera } = internals;
        const rect = viewer.getBoundingClientRect();
        const pointer = new THREE.Vector2(
            ((event.clientX - rect.left) / rect.width) * 2 - 1,
            -((event.clientY - rect.top) / rect.height) * 2 + 1
        );

        const raycaster = new THREE.Raycaster();
        raycaster.setFromCamera(pointer, camera);

        const intersects = raycaster.intersectObjects(scene.children, true);
        const hit = intersects.find(i => i.object.isMesh && i.object.visible);

        if (hit) {
            console.log('[3D Viewer] Selected:', hit.object.name || '(unnamed)', hit.object);
            highlightMesh(hit.object);
            showProperties(hit.object);
        } else {
            clearHighlight();
            document.getElementById('properties-content').innerHTML =
                '<div class="no-selection">Click on a part to view its properties</div>';
        }
    });

    // ─── FIND MESH BY NAME & NAVIGATE CAMERA ───
    function findMeshByName(name) {
        const internals = getInternals();
        if (!internals) return null;
        let found = null;
        internals.scene.traverse((child) => {
            if (!found && child.isMesh && child.name === name) found = child;
        });
        return found;
    }

    function navigateToMesh(mesh) {
        // Highlight and show properties — no camera movement
        highlightMesh(mesh);
        showProperties(mesh);
        showPinAtMesh(mesh);
    }

    // ─── PIN OVERLAY ───
    let pinTarget = null;
    let pinVisible = false;
    let pinTimeout = null;

    function showPinAtMesh(mesh) {
        pinTarget = mesh;
        pinVisible = true;
        const pin = document.getElementById('part-pin');
        const label = document.getElementById('pin-label');
        label.textContent = mesh.name || '(unnamed)';
        pin.classList.add('visible');
        updatePinPosition();

        // Auto-hide pin after 6 seconds
        if (pinTimeout) clearTimeout(pinTimeout);
        pinTimeout = setTimeout(() => hidePin(), 6000);
    }

    function hidePin() {
        pinVisible = false;
        pinTarget = null;
        document.getElementById('part-pin').classList.remove('visible');
        if (pinTimeout) { clearTimeout(pinTimeout); pinTimeout = null; }
    }

    function updatePinPosition() {
        if (!pinTarget || !pinVisible) return;

        const internals = getInternals();
        if (!internals) return;

        const { camera } = internals;
        // Force-update matrices so projection uses current frame data
        camera.updateMatrixWorld(true);
        pinTarget.updateMatrixWorld(true);
        const bb = new THREE.Box3().setFromObject(pinTarget);
        const center = bb.getCenter(new THREE.Vector3());

        // Project 3D world position to 2D screen
        const projected = center.clone().project(camera);

        const rect = viewer.getBoundingClientRect();
        const x = (projected.x * 0.5 + 0.5) * rect.width + rect.left;
        const y = (-projected.y * 0.5 + 0.5) * rect.height + rect.top;

        const pin = document.getElementById('part-pin');
        pin.style.left = x + 'px';
        pin.style.top = y + 'px';

        requestAnimationFrame(updatePinPosition);
    }

    function findAndSelectMeshByName(meshName) {
        const mesh = findMeshByName(meshName);
        if (mesh) {
            navigateToMesh(mesh);
            return true;
        }
        return false;
    }

    // ─── SHOW PROPERTIES PANEL ───
    function escapeHtml(str) {
        const div = document.createElement('div');
        div.appendChild(document.createTextNode(str));
        return div.innerHTML;
    }

    function fmt(n) { return n.toLocaleString(); }

    function showProperties(mesh) {
        const content = document.getElementById('properties-content');
        const geo = mesh.geometry;
        const mat = mesh.material;
        const bb = new THREE.Box3().setFromObject(mesh);
        const size = bb.getSize(new THREE.Vector3());
        const pos = mesh.getWorldPosition(new THREE.Vector3());

        const vertexCount = geo.attributes.position ? geo.attributes.position.count : 0;
        const indexCount = geo.index ? geo.index.count : 0;
        const faceCount = indexCount > 0 ? indexCount / 3 : vertexCount / 3;

        let partName = mesh.name || '(unnamed)';
        let parentName = (mesh.parent && mesh.parent.name) ? mesh.parent.name : '';

        let colorHex = '#888888';
        if (mat.color) colorHex = '#' + mat.color.getHexString();

        let html = '';

        // Identity
        html += '<div class="section-title">Identity</div><table>';
        html += '<tr><td>Name</td><td>' + escapeHtml(partName) + '</td></tr>';
        if (parentName) html += '<tr><td>Parent</td><td>' + escapeHtml(parentName) + '</td></tr>';
        html += '<tr><td>Type</td><td>' + mesh.type + '</td></tr>';
        html += '</table>';

        // Geometry
        html += '<div class="section-title">Geometry</div><table>';
        html += '<tr><td>Vertices</td><td>' + fmt(vertexCount) + '</td></tr>';
        html += '<tr><td>Faces</td><td>' + fmt(Math.floor(faceCount)) + '</td></tr>';
        html += '<tr><td>Size (m)</td><td>' + size.x.toFixed(2) + ' &times; ' + size.y.toFixed(2) + ' &times; ' + size.z.toFixed(2) + '</td></tr>';
        html += '<tr><td>Position</td><td>' + pos.x.toFixed(2) + ', ' + pos.y.toFixed(2) + ', ' + pos.z.toFixed(2) + '</td></tr>';
        html += '</table>';

        // Material
        html += '<div class="section-title">Material</div><table>';
        html += '<tr><td>Name</td><td>' + escapeHtml(mat.name || '(unnamed)') + '</td></tr>';
        html += '<tr><td>Type</td><td>' + mat.type + '</td></tr>';
        html += '<tr><td>Color</td><td><span style="display:inline-block;width:14px;height:14px;border-radius:3px;background:' + colorHex + ';vertical-align:middle;margin-right:6px;border:1px solid rgba(255,255,255,0.2);"></span>' + colorHex + '</td></tr>';
        if (mat.metalness !== undefined) html += '<tr><td>Metalness</td><td>' + mat.metalness.toFixed(2) + '</td></tr>';
        if (mat.roughness !== undefined) html += '<tr><td>Roughness</td><td>' + mat.roughness.toFixed(2) + '</td></tr>';
        html += '<tr><td>Opacity</td><td>' + (mat.opacity !== undefined ? mat.opacity.toFixed(2) : '1.00') + '</td></tr>';
        html += '</table>';

        // Custom properties (extras stored in GLB)
        if (mesh.userData && Object.keys(mesh.userData).length > 0) {
            html += '<div class="section-title">Custom Properties</div><table>';
            for (const [key, val] of Object.entries(mesh.userData)) {
                html += '<tr><td>' + escapeHtml(String(key)) + '</td><td>' + escapeHtml(String(val)) + '</td></tr>';
            }
            html += '</table>';
        }

        content.innerHTML = html;
        document.getElementById('properties-panel').classList.add('visible');
    }

    // ─── ANNOTATIONS SYSTEM ───
    const STORAGE_KEY = '3d_inspection_annotations';
    let annotations = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
    let editingIndex = -1;
    let rightClickMeshName = '';
    let rightClickHitPoint = null;

    function saveToStorage() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(annotations));
        // Rebuild floating 3D labels whenever annotations change
        if (typeof buildFloatingLabels === 'function') buildFloatingLabels();
    }

    // Right-click: track drag vs tap for pan vs context menu
    let rightDownPos = null;
    let rightDownTime = 0;

    viewer.addEventListener('pointerdown', (event) => {
        if (event.button === 2) {
            rightDownPos = { x: event.clientX, y: event.clientY };
            rightDownTime = Date.now();
        }
    });

    viewer.addEventListener('pointerup', (event) => {
        if (event.button === 2 && rightDownPos) {
            const dx = event.clientX - rightDownPos.x;
            const dy = event.clientY - rightDownPos.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            const elapsed = Date.now() - rightDownTime;
            rightDownPos = null;

            // Only show context menu if barely moved (tap, not drag/pan)
            if (dist > 8 || elapsed > 400) return;

            const internals = getInternals();
            if (!internals) return;

            const { scene, camera } = internals;
            const rect = viewer.getBoundingClientRect();
            const pointer = new THREE.Vector2(
                ((event.clientX - rect.left) / rect.width) * 2 - 1,
                -((event.clientY - rect.top) / rect.height) * 2 + 1
            );

            const raycaster = new THREE.Raycaster();
            raycaster.setFromCamera(pointer, camera);
            const intersects = raycaster.intersectObjects(scene.children, true);
            const hit = intersects.find(i => i.object.isMesh && i.object.visible);

            if (hit) {
                highlightMesh(hit.object);
                showProperties(hit.object);
                rightClickMeshName = hit.object.name || '(unnamed)';
                rightClickHitPoint = { x: hit.point.x, y: hit.point.y, z: hit.point.z };

                const menu = document.getElementById('context-menu');
                menu.style.display = 'block';
                menu.style.left = event.clientX + 'px';
                menu.style.top = event.clientY + 'px';

                requestAnimationFrame(() => {
                    const mr = menu.getBoundingClientRect();
                    if (mr.right > window.innerWidth) menu.style.left = (event.clientX - mr.width) + 'px';
                    if (mr.bottom > window.innerHeight) menu.style.top = (event.clientY - mr.height) + 'px';
                });
            }
        }
    });

    // Suppress browser context menu — pan handled by model-viewer natively
    viewer.addEventListener('contextmenu', (event) => {
        event.preventDefault();
    });

    // Close context menu on any click
    document.addEventListener('click', () => {
        document.getElementById('context-menu').style.display = 'none';
    });

    window.openAnnotationForm = function(index) {
        document.getElementById('context-menu').style.display = 'none';
        const modal = document.getElementById('annotation-modal');

        if (typeof index === 'number' && annotations[index]) {
            // Editing existing
            editingIndex = index;
            const a = annotations[index];
            document.getElementById('ann-equipment').value = a.equipmentName;
            document.getElementById('ann-status').value = a.status;
            document.getElementById('ann-inspector').value = a.inspector || '';
            document.getElementById('ann-date').value = a.date;
            document.getElementById('ann-remarks').value = a.remarks;
            document.getElementById('modal-title').textContent = 'Edit Annotation';
            document.getElementById('btn-ann-delete').style.display = 'inline-block';
        } else {
            // New annotation
            editingIndex = -1;
            document.getElementById('ann-equipment').value = rightClickMeshName;
            document.getElementById('ann-status').value = 'Good';
            document.getElementById('ann-inspector').value = localStorage.getItem('3d_inspector_name') || '';
            document.getElementById('ann-date').value = new Date().toISOString().slice(0, 10);
            document.getElementById('ann-remarks').value = '';
            document.getElementById('modal-title').textContent = 'Add Annotation';
            document.getElementById('btn-ann-delete').style.display = 'none';
        }

        modal.classList.add('visible');
    };

    window.closeAnnotationModal = function() {
        document.getElementById('annotation-modal').classList.remove('visible');
        editingIndex = -1;
    };

    window.saveAnnotation = function() {
        const equipmentName = document.getElementById('ann-equipment').value.trim();
        const status = document.getElementById('ann-status').value;
        const inspector = document.getElementById('ann-inspector').value.trim();
        const date = document.getElementById('ann-date').value;
        const remarks = document.getElementById('ann-remarks').value.trim();

        if (!equipmentName) { alert('Please enter an equipment name'); return; }

        // Remember inspector name for next time
        if (inspector) localStorage.setItem('3d_inspector_name', inspector);

        const entry = {
            meshName: rightClickMeshName,
            equipmentName,
            status,
            inspector,
            date,
            remarks,
            timestamp: new Date().toISOString()
        };

        // Store exact 3D hit point for precise label positioning
        if (editingIndex < 0 && rightClickHitPoint) {
            entry.hitPoint = rightClickHitPoint;
        } else if (editingIndex >= 0 && annotations[editingIndex] && annotations[editingIndex].hitPoint) {
            entry.hitPoint = annotations[editingIndex].hitPoint;
        }

        if (editingIndex >= 0) {
            annotations[editingIndex] = entry;
        } else {
            annotations.push(entry);
        }

        saveToStorage();
        closeAnnotationModal();
        console.log('[3D Viewer] Annotation saved:', entry);
    };

    window.deleteAnnotation = function() {
        if (editingIndex >= 0 && confirm('Delete this annotation?')) {
            annotations.splice(editingIndex, 1);
            saveToStorage();
            closeAnnotationModal();
            renderAnnotationsTable();
        }
    };

    window.viewPartAnnotations = function() {
        document.getElementById('context-menu').style.display = 'none';
        toggleAnnotationsPanel(rightClickMeshName);
    };

    // ─── ANNOTATIONS TABLE PANEL ───
    window.toggleAnnotationsPanel = function(filterMesh) {
        const panel = document.getElementById('annotations-panel');
        if (panel.classList.contains('visible') && !filterMesh) {
            panel.classList.remove('visible');
        } else {
            panel.classList.add('visible');
            renderAnnotationsTable(filterMesh);
        }
    };

    function statusClass(status) {
        return 'status-' + status.toLowerCase().replace(/\s+/g, '-').replace(/[^a-z-]/g, '');
    }

    function renderAnnotationsTable(filterMesh) {
        const container = document.getElementById('annotations-table-container');
        let data = annotations;
        if (filterMesh) data = data.filter(a => a.meshName === filterMesh);

        if (data.length === 0) {
            container.innerHTML = '<div class="ap-empty">No annotations yet. Right-click on a part to add one.</div>';
            return;
        }

        let html = '<table><thead><tr>';
        html += '<th>#</th><th>Equipment</th><th>Status</th><th>Inspector</th><th>Date</th><th>Remarks</th><th>Action</th>';
        html += '</tr></thead><tbody>';

        data.forEach((a, idx) => {
            const realIdx = annotations.indexOf(a);
            html += '<tr>';
            html += '<td>' + (idx + 1) + '</td>';
            html += '<td>' + escapeHtml(a.equipmentName) + '</td>';
            html += '<td><span class="status-badge ' + statusClass(a.status) + '">' + escapeHtml(a.status) + '</span></td>';
            html += '<td>' + escapeHtml(a.inspector || '-') + '</td>';
            html += '<td>' + escapeHtml(a.date || '-') + '</td>';
            html += '<td>' + escapeHtml(a.remarks || '-') + '</td>';
            html += '<td style="white-space:nowrap;">';
            html += '<button onclick="editAnnotationFromTable(' + realIdx + ')" style="background:rgba(99,102,241,0.15);border:1px solid rgba(99,102,241,0.3);color:#a5b4fc;padding:4px 10px;border-radius:4px;cursor:pointer;font-size:11px;">Edit</button>';
            html += '</td>';
            html += '</tr>';
        });

        html += '</tbody></table>';
        container.innerHTML = html;
    }

    window.editAnnotationFromTable = function(idx) {
        const a = annotations[idx];
        if (!a) return;
        rightClickMeshName = a.meshName;
        openAnnotationForm(idx);
    };

    // ─── EXPORT / IMPORT ───
    window.exportJSON = function() {
        const blob = new Blob([JSON.stringify(annotations, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'inspection_annotations_' + new Date().toISOString().slice(0,10) + '.json';
        a.click();
        URL.revokeObjectURL(url);
    };

    window.importJSON = function(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const imported = JSON.parse(e.target.result);
                if (!Array.isArray(imported)) { alert('Invalid file format'); return; }
                annotations = imported;
                saveToStorage();
                renderAnnotationsTable();
                alert('Imported ' + imported.length + ' annotations successfully.');
            } catch (err) {
                alert('Error reading file: ' + err.message);
            }
        };
        reader.readAsText(file);
        event.target.value = '';
    };



    // ─── POTREE-STYLE FLOATING 3D LABELS ───
    let floatingLabelsVisible = true;
    const labelsContainer = document.getElementById('floating-labels-container');
    let labelElements = [];  // { el, meshName, annotation }
    let labelsRAFRunning = false;

    function floatingDotClass(status) {
        return status.toLowerCase().replace(/\s+/g, '-').replace(/[^a-z-]/g, '');
    }

    window.toggleFloatingLabels = function() {
        floatingLabelsVisible = !floatingLabelsVisible;
        const btn = document.getElementById('btn-labels');
        btn.classList.toggle('active', floatingLabelsVisible);
        labelsContainer.style.display = floatingLabelsVisible ? 'block' : 'none';
    };

    window.toggleAnnotationsDropdown = function(e) {
        e.stopPropagation();
        document.getElementById('annotations-dropdown').classList.toggle('visible');
    };
    window.closeAnnotationsDropdown = function() {
        document.getElementById('annotations-dropdown').classList.remove('visible');
    };
    document.addEventListener('click', (e) => {
        const dropdown = document.getElementById('annotations-dropdown');
        if (dropdown.classList.contains('visible') && !e.target.closest('.btn-group')) {
            closeAnnotationsDropdown();
        }
        // Close floating label popup on outside click
        const flPopup = document.getElementById('fl-popup-menu');
        if (flPopup.classList.contains('visible') && !e.target.closest('#fl-popup-menu') && !e.target.closest('.float-label')) {
            flPopup.classList.remove('visible');
        }
    });

    // ─── FLOATING LABEL POPUP MENU ───
    window.showFloatingLabelPopup = function(e, meshName, annotationIndex) {
        const popup = document.getElementById('fl-popup-menu');

        // Wire up the buttons
        document.getElementById('fpm-edit').onclick = function() {
            popup.classList.remove('visible');
            rightClickMeshName = meshName;
            openAnnotationForm(annotationIndex);
        };
        document.getElementById('fpm-view').onclick = function() {
            popup.classList.remove('visible');
            toggleAnnotationsPanel(meshName);
        };

        // Position near the click
        popup.style.left = e.clientX + 'px';
        popup.style.top = e.clientY + 'px';
        popup.classList.add('visible');

        // Adjust if overflowing viewport
        requestAnimationFrame(() => {
            const r = popup.getBoundingClientRect();
            if (r.right > window.innerWidth) popup.style.left = (e.clientX - r.width) + 'px';
            if (r.bottom > window.innerHeight) popup.style.top = (e.clientY - r.height) + 'px';
        });
    };

    function buildFloatingLabels() {
        // Clear existing
        labelsContainer.innerHTML = '';
        labelElements = [];

        // Group annotations by meshName — show latest per mesh
        const latestByMesh = new Map();
        annotations.forEach((a, idx) => {
            latestByMesh.set(a.meshName, { annotation: a, index: idx });
        });

        latestByMesh.forEach(({ annotation, index }, meshName) => {
            const el = document.createElement('div');
            el.className = 'float-label';

            const dot = floatingDotClass(annotation.status);
            const remarkText = annotation.remarks ? escapeHtml(annotation.remarks) : '';
            const metaText = (annotation.inspector ? escapeHtml(annotation.inspector) : '') +
                             (annotation.date ? ' — ' + escapeHtml(annotation.date) : '');

            el.innerHTML =
                '<div class="fl-bubble">' +
                    '<span class="fl-dot ' + dot + '"></span>' +
                    '<span class="fl-title">' + escapeHtml(annotation.equipmentName) + '</span>' +
                '</div>' +
                (remarkText || metaText ? '<div class="fl-expand">' +
                    (remarkText ? '<div>' + remarkText + '</div>' : '') +
                    (metaText ? '<div class="fl-meta">' + metaText + '</div>' : '') +
                '</div>' : '') +
                '<div class="fl-stem"></div>' +
                '<div class="fl-anchor"></div>';

            el.addEventListener('click', (e) => {
                e.stopPropagation();
                showFloatingLabelPopup(e, meshName, index);
            });

            labelsContainer.appendChild(el);
            labelElements.push({ el, meshName, annotation, hitPoint: annotation.hitPoint || null });
        });

        // Start the projection loop if not running
        if (!labelsRAFRunning && labelElements.length > 0) {
            labelsRAFRunning = true;
            updateFloatingLabelPositions();
        }
    }

    function updateFloatingLabelPositions() {
        if (!floatingLabelsVisible || labelElements.length === 0) {
            labelsRAFRunning = false;
            return;
        }

        const internals = getInternals();
        if (!internals) {
            requestAnimationFrame(updateFloatingLabelPositions);
            return;
        }

        const { scene: threeScene, camera } = internals;
        // Force-update camera matrices so projection uses current frame data
        camera.updateMatrixWorld(true);
        const rect = viewer.getBoundingClientRect();

        labelElements.forEach(item => {
            const mesh = findMeshByName(item.meshName);
            if (!mesh) {
                item.el.classList.add('hidden');
                return;
            }

            // Force-update mesh world matrix for accurate bounding box / position
            mesh.updateMatrixWorld(true);

            // Use stored hit point for precise positioning, fall back to bounding box center
            let center;
            if (item.hitPoint) {
                center = new THREE.Vector3(item.hitPoint.x, item.hitPoint.y, item.hitPoint.z);
            } else {
                const bb = new THREE.Box3().setFromObject(mesh);
                center = bb.getCenter(new THREE.Vector3());
            }

            // Project to screen
            const projected = center.clone().project(camera);

            // Behind camera check
            if (projected.z > 1) {
                item.el.classList.add('hidden');
                return;
            }

            const x = (projected.x * 0.5 + 0.5) * rect.width + rect.left;
            const y = (-projected.y * 0.5 + 0.5) * rect.height + rect.top;

            // Out-of-bounds check (using absolute screen coordinates)
            if (x < rect.left - 100 || x > rect.right + 100 || y < rect.top - 100 || y > rect.bottom + 100) {
                item.el.classList.add('hidden');
                return;
            }

            item.el.classList.remove('hidden');
            item.el.style.left = x + 'px';
            item.el.style.top = y + 'px';

            // Depth-based z-index: closer = higher
            item.el.style.zIndex = Math.round((1 - projected.z) * 10000);

            // Subtle scale based on distance (closer = slightly larger)
            const scale = Math.max(0.7, Math.min(1.15, 1.0 / (projected.z * 0.5 + 0.5)));
            item.el.style.transform = 'translate(-50%, calc(-100% - 28px)) scale(' + scale.toFixed(3) + ')';
        });

        requestAnimationFrame(updateFloatingLabelPositions);
    }

    // Rebuild labels when annotations change
    // (handled inside saveToStorage above)

    // Initial build after model loads
    viewer.addEventListener('load', function() {
        // Small delay to let meshes settle
        setTimeout(buildFloatingLabels, 500);
    });

    // Also build immediately if model already loaded
    if (annotations.length > 0) {
        setTimeout(buildFloatingLabels, 1000);
    }

    // ─── PDF EXPORT (Professional) ───
    window.exportPDF = function() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a4' });
        const pageW = doc.internal.pageSize.getWidth();
        const pageH = doc.internal.pageSize.getHeight();
        const margin = 15;
        const brandColor = [99, 102, 241];
        const now = new Date();

        // ── Header bar ──
        doc.setFillColor(...brandColor);
        doc.rect(0, 0, pageW, 28, 'F');

        doc.setFont('helvetica', 'bold');
        doc.setFontSize(20);
        doc.setTextColor(255, 255, 255);
        doc.text('INSPECTION REPORT', margin, 12);

        doc.setFont('helvetica', 'normal');
        doc.setFontSize(9);
        doc.setTextColor(210, 210, 255);
        doc.text('Equipment Inspection & Condition Assessment', margin, 19);
        doc.text('Confidential', margin, 24);

        // Right side of header
        doc.setTextColor(255, 255, 255);
        doc.setFont('helvetica', 'bold');
        doc.setFontSize(9);
        doc.text('Date: ' + now.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' }), pageW - margin, 12, { align: 'right' });
        doc.setFont('helvetica', 'normal');
        doc.text('Generated: ' + now.toLocaleTimeString(), pageW - margin, 19, { align: 'right' });

        // ── Summary cards ──
        let y = 36;
        const cardH = 18;
        const cardW = (pageW - margin * 2 - 12) / 4;

        const goodCount = annotations.filter(a => a.status === 'Good').length;
        const repairCount = annotations.filter(a => a.status === 'Needs Repair').length;
        const criticalCount = annotations.filter(a => a.status === 'Critical').length;
        const otherCount = annotations.length - goodCount - repairCount - criticalCount;

        const cards = [
            { label: 'Total Items', value: annotations.length, color: [99, 102, 241] },
            { label: 'Good', value: goodCount, color: [34, 197, 94] },
            { label: 'Needs Repair', value: repairCount, color: [234, 179, 8] },
            { label: 'Critical', value: criticalCount, color: [239, 68, 68] }
        ];

        cards.forEach((card, i) => {
            const cx = margin + i * (cardW + 4);
            doc.setFillColor(245, 245, 250);
            doc.roundedRect(cx, y, cardW, cardH, 2, 2, 'F');

            // Left color accent
            doc.setFillColor(...card.color);
            doc.rect(cx, y, 3, cardH, 'F');

            doc.setFont('helvetica', 'bold');
            doc.setFontSize(16);
            doc.setTextColor(...card.color);
            doc.text(String(card.value), cx + 10, y + 11);

            doc.setFont('helvetica', 'normal');
            doc.setFontSize(8);
            doc.setTextColor(100, 100, 100);
            doc.text(card.label, cx + 10, y + 16);
        });

        y += cardH + 8;

        // ── Table ──
        const rows = annotations.map((a, i) => [
            i + 1,
            a.equipmentName,
            a.status,
            a.inspector || '-',
            a.date || '-',
            a.remarks || '-'
        ]);

        doc.autoTable({
            startY: y,
            head: [['#', 'Equipment Name', 'Status', 'Inspector', 'Date', 'Remarks']],
            body: rows,
            margin: { left: margin, right: margin },
            styles: {
                fontSize: 8.5,
                cellPadding: { top: 4, bottom: 4, left: 4, right: 4 },
                lineColor: [230, 230, 230],
                lineWidth: 0.3,
                textColor: [40, 40, 40],
                font: 'helvetica'
            },
            headStyles: {
                fillColor: brandColor,
                textColor: [255, 255, 255],
                fontStyle: 'bold',
                fontSize: 8.5,
                halign: 'left'
            },
            alternateRowStyles: {
                fillColor: [248, 248, 252]
            },
            columnStyles: {
                0: { cellWidth: 10, halign: 'center' },
                1: { cellWidth: 75 },
                2: { cellWidth: 28 },
                3: { cellWidth: 30 },
                4: { cellWidth: 25 },
                5: { cellWidth: 'auto' }
            },
            didParseCell: function(data) {
                // Color-code status column
                if (data.section === 'body' && data.column.index === 2) {
                    const val = data.cell.raw;
                    if (val === 'Good') data.cell.styles.textColor = [22, 163, 74];
                    else if (val === 'Needs Repair') data.cell.styles.textColor = [180, 130, 0];
                    else if (val === 'Critical') { data.cell.styles.textColor = [220, 38, 38]; data.cell.styles.fontStyle = 'bold'; }
                    else if (val === 'Replaced') data.cell.styles.textColor = [99, 102, 241];
                    else data.cell.styles.textColor = [120, 120, 120];
                }
            },
            didDrawPage: function(data) {
                // Footer on every page
                const pageNum = doc.internal.getNumberOfPages();
                doc.setFontSize(7.5);
                doc.setTextColor(150, 150, 150);
                doc.setFont('helvetica', 'normal');
                doc.text('Page ' + data.pageNumber + ' of ' + pageNum, pageW - margin, pageH - 8, { align: 'right' });
                doc.text('3D Inspection System — Generated ' + now.toLocaleDateString('en-GB'), margin, pageH - 8);

                // Thin line above footer
                doc.setDrawColor(220, 220, 220);
                doc.setLineWidth(0.3);
                doc.line(margin, pageH - 12, pageW - margin, pageH - 12);
            }
        });

        // ── Signature area on last page ──
        const finalY = doc.lastAutoTable.finalY || y + 20;
        if (finalY + 40 < pageH - 20) {
            const sigY = finalY + 20;
            doc.setDrawColor(180, 180, 180);
            doc.setLineWidth(0.4);

            // Inspector signature
            doc.line(margin, sigY + 12, margin + 60, sigY + 12);
            doc.setFontSize(8);
            doc.setTextColor(100, 100, 100);
            doc.text('Inspector Signature', margin, sigY + 17);

            // Date
            doc.line(margin + 80, sigY + 12, margin + 130, sigY + 12);
            doc.text('Date', margin + 80, sigY + 17);

            // Approved by
            doc.line(margin + 150, sigY + 12, margin + 210, sigY + 12);
            doc.text('Reviewed & Approved By', margin + 150, sigY + 17);
        }

        doc.save('Inspection_Report_' + now.toISOString().slice(0,10) + '.pdf');
    };
</script>
